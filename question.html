<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Question</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="site-header"></div>

<section>

<h1 id="title">Chargement...</h1>

<div class="section">
  <h2>Énoncé</h2>
  <div id="statement"></div>
</div>

<div class="section grid">
  <div class="column">
    <h2>Tags</h2>
    <div id="tags"></div>
  </div>

  <div class="column">
    <h2>Documents</h2>
    <ul id="documents"></ul>
  </div>
</div>

<div class="section">
  <h2>Examens</h2>
  <ul id="exams"></ul>
</div>

</section>

<script>
fetch("header.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("site-footer").innerHTML = data;
  });
</script>

<script>
// Get ID from URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if (!id) {
  document.body.innerHTML = "<p>Erreur: aucun ID fourni</p>";
}

// Load JSON
fetch("questions/" + id + ".json")
  .then(res => {
    if (!res.ok) throw new Error("Question introuvable");
    return res.json();
  })
  .then(q => {

    const title = document.getElementById("title");
    const statementDiv = document.getElementById("statement");

    // TITLE
    title.textContent = q.title;

    // clear statement container
    statementDiv.innerHTML = "";

    // STATEMENT
    const p = document.createElement("p");
    p.textContent = q.statement;
    statementDiv.appendChild(p);

    // IMAGE (optional)
    if (q.image) {
      const img = document.createElement("img");
      img.src = "./questions/illustrations/" + q.image;
      img.alt = "Figure de la question";
      img.style.maxWidth = "100%";
      img.style.marginTop = "20px";
      img.style.border = "3px solid red";
      img.style.display = "block";

      img.onerror = () => {
        console.warn("Image not found:", img.src);
      };

      statementDiv.appendChild(img);
    }

    // Tags
    const tagsDiv = document.getElementById("tags");
    q.tags?.forEach(tag => {
      const span = document.createElement("span");
      span.className = "tag";
      span.textContent = tag;
      tagsDiv.appendChild(span);
    });

    // Documents
    const docList = document.getElementById("documents");
    q.documents?.forEach(doc => {
      const li = document.createElement("li");
      const a = document.createElement("a");

      a.href = "documents/" + id + "/" + doc.file;
      a.textContent = doc.name;
      a.target = "_blank";

      li.appendChild(a);
      docList.appendChild(li);
    });

    // Exams
    const examList = document.getElementById("exams");
    q.exams?.forEach(exam => {
      const li = document.createElement("li");
      li.textContent = exam;
      examList.appendChild(li);
    });

  })
  .catch(err => {
    document.body.innerHTML = "<p>Erreur: " + err.message + "</p>";
  });
</script>

</body>
</html>
